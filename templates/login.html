<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lender Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0F4C81,#3B82F6);
}

.login-box{
    width:380px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
}

.login-box h1{
    color:#0F4C81;
    margin-bottom:10px;
}

.login-box p{
    color:gray;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#0F4C81;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2563EB;
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🏦</div>

<h1>Smart Lender</h1>

<p>Loan Prediction System</p>

<form method="POST">

    <input type="email" name="email" placeholder="Enter Email" required>

    <br><br>

    <input type="password" name="password" placeholder="Enter Password" required>

    <br><br>

    <button type="submit">Login</button>

</form>

<a href="/register">Create new account</a>
</div>

</body>
</html>
