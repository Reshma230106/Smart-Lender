<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction Result</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0F4C81,#3B82F6);
        }

        .card{
    background:#fff;
    width:500px;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);

    animation: popup 0.6s ease;
}

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            color:#1E3A8A;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#0F4C81;
            color:white;
            padding:15px 35px;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#2563EB;
        }
        @keyframes popup{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
    </style>
</head>

<body>

<div class="card">

    {% if prediction_text == "Loan Approved" %}
        <div class="icon">✅</div>
        <h1>{{ prediction_text }}</h1>
        <p>Congratulations! Your loan application is likely to be approved.</p>
    {% else %}
        <div class="icon">❌</div>
        <h1>{{ prediction_text }}</h1>
        <p>Sorry! Your loan application is likely to be rejected.</p>
    {% endif %}

    <a href="/prediction" class="btn">Predict Again</a>

</div>

</body>
</html>
