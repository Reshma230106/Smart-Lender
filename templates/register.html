<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lender Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0F4C81,#3B82F6);
}

.register-box{
    width:380px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
}

.register-box h1{
    color:#0F4C81;
    margin-bottom:10px;
}

.register-box p{
    color:gray;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#0F4C81;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2563EB;
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

a{
    display:block;
    margin-top:20px;
    color:#0F4C81;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">🏦</div>

<h1>Smart Lender</h1>

<p>Create Your Account</p>

<form method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Create Password" required>

<button type="submit">Register</button>

</form>

<a href="/">Already have an account? Login</a>

</div>

</body>
</html>
