<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lender | Loan Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0F4C81,#2563EB);
}

.container{
    width:1000px;
    height:620px;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.left{

    width:45%;
    background:linear-gradient(160deg,#0F4C81,#1E40AF);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
    text-align:center;

}

.left .logo{

    font-size:90px;
    margin-bottom:20px;

}

.left h1{

    font-size:45px;
    margin-bottom:15px;

}

.left p{

    font-size:20px;
    line-height:34px;

}

.right{

    width:55%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;

}

.form-box{

    width:80%;

}

.form-box h2{

    color:#0F4C81;
    text-align:center;
    margin-bottom:35px;
    font-size:34px;

}

.input-box{

    margin-bottom:18px;

}

.input-box label{

    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:600;

}

.input-box input,
.input-box select{

    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
    transition:.3s;

}

.input-box input:focus,
.input-box select:focus{

    outline:none;
    border-color:#2563EB;
    box-shadow:0 0 10px rgba(37,99,235,.3);

}

button{

    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#0F4C81;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;

}

button:hover{

    background:#2563EB;
    transform:translateY(-2px);

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#888;
    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="logo">🏦</div>

<h1>Smart Lender</h1>

<p>

Loan Prediction System

<br><br>

Predict your loan approval instantly using Machine Learning.

<br><br>

✔ Fast<br>
✔ Secure<br>
✔ Reliable

</p>

</div>

<div class="right">

<div class="form-box">

<h2>Loan Prediction</h2>

<form action="/predict" method="POST">

<div class="input-box">
<label>👤 Applicant Income</label>
<input type="number" name="ApplicantIncome" placeholder="Enter Applicant Income" required>
</div>

<div class="input-box">
<label>👥 Coapplicant Income</label>
<input type="number" name="CoapplicantIncome" placeholder="Enter Coapplicant Income" required>
</div>

<div class="input-box">
<label>💰 Loan Amount</label>
<input type="number" name="LoanAmount" placeholder="Enter Loan Amount" required>
</div>

<div class="input-box">
<label>📅 Loan Amount Term</label>
<input type="number" name="Loan_Amount_Term" placeholder="360" required>
</div>

<div class="input-box">
<label>✔ Credit History</label>

<select name="Credit_History">

<option value="1">Good (1)</option>

<option value="0">Bad (0)</option>

</select>

</div>

<button type="submit">
Predict Loan
</button>

</form>

<div class="footer">
Smart Lender © 2026
</div>

</div>

</div>

</div>

</body>
</html>
